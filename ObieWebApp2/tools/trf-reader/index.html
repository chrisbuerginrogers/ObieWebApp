<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TRF File Reader — ObieWebApp 2</title>

  <link rel="stylesheet" href="../../css/theme.css">
  <link rel="stylesheet" href="../../css/trf-reader.css">

  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

  <!-- PyScript 2026.3.1 -->
  <link  rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
  <script type="module"   src="https://pyscript.net/releases/2026.3.1/core.js"></script>

  <!-- Shared JS — order matters: theme first, then consumers -->
  <script src="../../js/plotly-theme.js"></script>
  <script src="../../js/plotly-helpers.js"></script>
  <script src="../../js/plot-controls.js"></script>
  <script src="../../js/file-loader.js"></script>
</head>
<body>

<div id="loading" class="loading-overlay">
  <div class="spin"></div>
  <div class="load-title">Loading PyScript…</div>
  <div class="load-sub">First load may take 15–30 s</div>
</div>

<header class="obie-header">
  <a class="brand" href="../../index.html">
    <div class="logo-icon">🎻</div>
    <h1>ObieWebApp 2</h1>
  </a>
  <span class="crumb">· TRF File Reader</span>
  <div class="gap"></div>
  <a class="btn" href="../../index.html">← All tools</a>
</header>

<main class="tool">

  <aside class="controls">

    <div class="card">
      <div class="section-title">📂 Open Files</div>
      <div id="dropzone" class="dropzone">
        <div class="big">📈</div>
        <div class="label">Drop TRF / TSV files here</div>
        <div class="hint">multiple files supported</div>
      </div>
      <input id="file-input" type="file" accept=".trf,.trv,.tsv" multiple hidden>
      <div style="display:flex;gap:6px;margin-top:10px">
        <button id="file-pick-btn" class="btn primary" style="flex:1">Add files…</button>
        <button id="clear-btn"     class="btn"         style="flex:0 0 auto">✕ Clear</button>
      </div>
      <div id="file-info" class="fileinfo" style="margin-top:8px"></div>
      <div class="section-title" style="margin-top:10px">Loaded traces</div>
      <div id="file-list" style="font-size:0.8rem;color:var(--muted);margin-top:4px">
        <span class="muted">none</span>
      </div>
    </div>

    <div class="card">
      <div class="section-title">📊 Plot Axes</div>
      <div class="plot-controls">
        <div class="ctrl-row">
          <label>X scale</label>
          <div id="x-scale-toggle" class="toggle-group">
            <button data-scale="log">Log</button>
            <button data-scale="linear">Linear</button>
          </div>
        </div>
        <div class="ctrl-row">
          <label>X min</label>
          <input id="x-min" type="number" step="any" placeholder="auto">
          <label style="width:auto">max</label>
          <input id="x-max" type="number" step="any" placeholder="auto">
        </div>
        <div class="ctrl-row">
          <label>Y scale</label>
          <div id="y-scale-toggle" class="toggle-group">
            <button data-scale="log">Log</button>
            <button data-scale="linear">Linear</button>
          </div>
        </div>
        <div class="ctrl-row">
          <label>Y min</label>
          <input id="y-min" type="number" step="any" placeholder="auto">
          <label style="width:auto">max</label>
          <input id="y-max" type="number" step="any" placeholder="auto">
        </div>
        <button id="autoscale-btn" class="btn" style="margin-top:6px">↺ Reset / autoscale</button>

        <div class="ctrl-row" style="margin-top:10px">
          <label>Line width</label>
          <div class="range-row">
            <input type="range" id="line-width" min="0.5" max="4" step="0.5" value="1.8">
            <span class="range-val" id="line-width-disp">1.8px</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">ℹ︎ File Header</div>
      <div id="hdr-box"><span class="muted">no file loaded</span></div>
    </div>

  </aside>

  <section class="plot-area">
    <h3>Frequency Response</h3>
    <div id="plot"></div>
    <div id="status-msg" class="info">Loading PyScript…</div>
  </section>

</main>

<script type="py" src="./main.py" config='{
  "packages": [],
  "files": {
    "../../py/dom.py":        "./dom.py",
    "../../py/files.py":      "./files.py",
    "../../py/trf_parser.py": "./trf_parser.py",
    "../../py/tsv_parser.py": "./tsv_parser.py"
  }
}' async></script>

</body>
</html>
